name: Check Ambassade Cron

on:
  schedule:
    # Ton cron : toutes les 15 min, de 8h à 18h, du lundi au samedi
    - cron: '*/15 6-16 * * 1-6'
  workflow_dispatch: # Ajoute un bouton "Play" manuel sur GitHub pour tester

jobs:
  run-bot:
    runs-on: ubuntu-latest # GitHub nous prête un serveur sous Linux
    steps:
      # 1. Copie ton code sur le serveur temporaire
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Installe Python proprement
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Installe les bibliothèques listées dans ton requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lance enfin ton script
      - name: Run script
              env:
                EMAIL_USER: ${{ secrets.EMAIL_USER }}
                EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
                EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
              run: python check_visa.py
